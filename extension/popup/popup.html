<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      font-size: 13px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #21262d;
    }
    .brand { font-size: 15px; font-weight: 700; }
    .brand span { opacity: 0.5; font-size: 11px; font-weight: 400; margin-left: 4px; }

    /* Focus Mode Section */
    .focus-section {
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
    }

    .focus-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .focus-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6e7681; }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .status-active   { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
    .status-inactive { background: #30363d; color: #6e7681; }

    .session-timer {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #e6edf3;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }

    .session-site {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 12px;
    }

    .btn {
      width: 100%;
      padding: 9px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-start  { background: #22c55e; color: #fff; }
    .btn-end    { background: #ef4444; color: #fff; }
    .btn-row    { display: flex; gap: 8px; }
    .btn-sm     { width: auto; flex: 1; font-size: 12px; padding: 7px; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: #21262d;
      border-top: 1px solid #21262d;
      border-bottom: 1px solid #21262d;
    }
    .stat-box {
      background: #0d1117;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-num { font-size: 18px; font-weight: 700; color: #e6edf3; display: block; }
    .stat-lbl { font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: 0.3px; }

    /* Last session + label */
    .last-section {
      padding: 12px 16px;
      border-bottom: 1px solid #21262d;
    }
    .last-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6e7681; margin-bottom: 8px; }
    .last-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .last-info { flex: 1; min-width: 0; }
    .last-site { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .last-dur  { font-size: 11px; color: #8b949e; }
    .label-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .lbl-btn {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid;
      background: transparent;
      transition: opacity 0.15s;
    }
    .lbl-btn:hover { opacity: 0.7; }
    .lbl-prod  { color: #22c55e; border-color: #22c55e44; }
    .lbl-dist  { color: #ef4444; border-color: #ef444444; }
    .lbl-active-prod  { background: #22c55e22 !important; }
    .lbl-active-dist  { background: #ef444422 !important; }

    /* Footer */
    .footer {
      padding: 10px 16px;
      display: flex;
      justify-content: center;
    }
    .footer a {
      font-size: 11px;
      color: #3b82f6;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    /* Loading */
    .loading { padding: 24px; text-align: center; color: #6e7681; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <span>⚡</span>
    <span class="brand">Focus Tracker <span>v2</span></span>
  </div>

  <div id="root">
    <div class="loading">Loading…</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
